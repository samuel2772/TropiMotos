spring.application.name=tropimotos-backend

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/BD_TROPIMOTOS
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=TropiMotosSecretKey2024SuperSeguraYLargeParaTokenJWTQueDebeSerMuyLarga
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.tropimotos=DEBUG
